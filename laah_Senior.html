<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Laah — Senior App Draft</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
::-webkit-scrollbar{width:0;}

body{
  background:#EDE8F5;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Rounded','Helvetica Neue',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:36px 16px 64px;gap:24px;
}

.page-head{text-align:center;}
.page-eye{font-size:11px;color:#A090C0;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
.page-brand{font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1;
  background:linear-gradient(135deg,#7C3AED,#C084FC,#F472B6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.page-sub{font-size:13px;color:#A090C0;margin-top:4px;}

.spec-box{background:rgba(255,255,255,.9);border:2px solid rgba(124,58,237,.15);
  border-radius:20px;padding:14px 20px;max-width:500px;width:100%;
  box-shadow:0 4px 20px rgba(124,58,237,.08);}
.spec-box h3{font-size:12px;color:#7C3AED;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.spec-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.spec-item{background:rgba(124,58,237,.05);border-radius:10px;padding:7px 10px;}
.spec-label{font-size:9px;color:#A090C0;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.spec-val{font-size:12px;color:#4A3070;font-weight:800;margin-top:1px;}

.tabs{display:flex;gap:4px;background:rgba(255,255,255,.8);border-radius:24px;padding:4px;
  border:2px solid rgba(255,255,255,.95);box-shadow:0 4px 16px rgba(124,58,237,.1);}
.tab{background:transparent;border:none;border-radius:20px;
  padding:9px 18px;color:#C0B0D8;font-weight:800;font-size:12px;cursor:pointer;transition:all .25s;}
.tab.tc{background:linear-gradient(135deg,#7C3AED,#A855F7);color:#FFF;box-shadow:0 4px 14px rgba(124,58,237,.35);}
.tab.th{background:linear-gradient(135deg,#DC2626,#F87171);color:#FFF;box-shadow:0 4px 14px rgba(220,38,38,.3);}
.tab.tm{background:linear-gradient(135deg,#059669,#34D399);color:#FFF;box-shadow:0 4px 14px rgba(5,150,105,.3);}

.pills{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:520px;}
.pill{background:rgba(255,255,255,.85);border:2px solid rgba(255,255,255,.95);
  border-radius:16px;padding:7px 14px;color:#A090C0;font-weight:700;font-size:11px;
  cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);}
.pill .pd{font-size:9px;opacity:.5;font-weight:500;}
.pill.pc{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.3);color:#5B21B6;}
.pill.ph{background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.25);color:#991B1B;}
.pill.pm{background:rgba(5,150,105,.1);border-color:rgba(5,150,105,.25);color:#065F46;}

/* ── Phone Shell ── */
/* Phone: 375×812. Usable inner: 812 - 38(padding-top) = 774px
   Status bar 28 + Bottom nav 68 + content = 774
   Content area ≈ 678px max */
.phone{
  width:375px;height:812px;
  border-radius:54px;flex-shrink:0;overflow:hidden;
  position:relative;display:flex;flex-direction:column;
  background:#FDF8FF;
  box-shadow:
    0 0 0 1px rgba(124,58,237,.15),
    0 0 0 11px #FFF,
    0 0 0 13px rgba(124,58,237,.12),
    0 50px 100px rgba(124,58,237,.18),
    0 20px 40px rgba(0,0,0,.08);
}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:120px;height:32px;background:#0D0820;border-radius:0 0 22px 22px;z-index:100;}
.phone-inner{flex:1;display:flex;flex-direction:column;padding-top:38px;overflow:hidden;}

/* Keyframes */
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes ripple{0%{transform:scale(1);opacity:.4;}100%{transform:scale(2.6);opacity:0;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes scan{0%{top:4%;}100%{top:86%;}}
@keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}
@keyframes barWave{0%,100%{transform:scaleY(.2);}50%{transform:scaleY(1);}}
@keyframes popIn{0%{transform:scale(.88);opacity:0;}100%{transform:scale(1);opacity:1;}}
@keyframes celebBounce{0%,100%{transform:scale(1);}40%{transform:scale(1.15);}70%{transform:scale(.96);}}

/* ── Senior components ── */
.sb{display:flex;justify-content:space-between;align-items:center;
  padding:0 26px;height:26px;font-size:13px;color:#C0B0D8;font-weight:700;flex-shrink:0;}

/* Screen: flex column, overflow hidden — NO global scroll */
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:fadeIn .25s ease;}

/* Laah speech bubble */
.lb{background:linear-gradient(135deg,rgba(99,163,237,.11),rgba(124,58,237,.07));
  border:2px solid rgba(99,163,237,.28);border-radius:8px 24px 24px 24px;padding:14px 18px;}
.lb-tag{font-size:11px;color:#7C3AED;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.lb-txt{font-size:20px;color:#1A0C3F;line-height:1.6;font-weight:500;}

/* ── BUTTONS — always outside scroll, fixed footer ── */
/* Primary: 76px tall — still 1.35× standard 56px, thumb-friendly */
.btn-zone{padding:10px 18px 6px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;}
.btn{width:100%;min-height:76px;border:none;border-radius:24px;
  font-size:20px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:transform .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.btn .bi{font-size:24px;}
.btn.purple{background:linear-gradient(135deg,#7C3AED,#A855F7);color:#FFF;box-shadow:0 6px 22px rgba(124,58,237,.38);}
.btn.purple:active{transform:scale(.97);}
.btn.green{background:linear-gradient(135deg,#059669,#34D399);color:#FFF;box-shadow:0 6px 22px rgba(5,150,105,.38);}
.btn.green:active{transform:scale(.97);}
.btn.red{background:linear-gradient(135deg,#DC2626,#F87171);color:#FFF;box-shadow:0 6px 22px rgba(220,38,38,.33);}
.btn.ghost{background:rgba(255,255,255,.92);border:2px solid rgba(124,58,237,.2);
  color:#6B5890;box-shadow:0 3px 12px rgba(0,0,0,.05);}

/* Voice hint */
.vhint{text-align:center;padding:4px 0 8px;flex-shrink:0;
  font-size:15px;color:#A090C0;}

/* Screen header — compact */
.shd{padding:10px 20px 12px;flex-shrink:0;}
.shd-eye{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.shd-title{font-size:30px;font-weight:900;color:#1A0C3F;letter-spacing:-.8px;line-height:1.1;}

/* Scroll zone — content only, buttons never inside */
.cscroll{flex:1;overflow-y:auto;padding:10px 18px;display:flex;flex-direction:column;gap:10px;min-height:0;}

/* Vital row — content cards */
.vrow{background:rgba(255,255,255,.9);border-radius:20px;padding:14px 18px;
  border:2px solid rgba(255,255,255,.98);box-shadow:0 3px 14px rgba(0,0,0,.04);
  display:flex;align-items:center;gap:14px;flex-shrink:0;}
.vnum{font-size:36px;font-weight:900;letter-spacing:-1.2px;line-height:1;}
.vunit{font-size:14px;font-weight:600;color:#A090C0;}
.vlbl{font-size:15px;color:#6B5890;font-weight:600;margin-top:2px;}

/* Nutrition bar */
.nbar-wrap{margin-bottom:12px;}
.nbar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.nbar-name{font-size:18px;font-weight:700;color:#1A0C3F;}
.nbar-val{font-size:18px;font-weight:800;}
.nbar-track{height:10px;background:rgba(200,190,220,.2);border-radius:6px;overflow:hidden;}
.nbar-fill{height:100%;border-radius:6px;transition:width .8s ease;}

/* Notification card */
.nc{background:rgba(255,255,255,.94);border:2px solid rgba(124,58,237,.18);
  border-radius:28px;overflow:hidden;box-shadow:0 14px 44px rgba(124,58,237,.11),0 5px 18px rgba(0,0,0,.05);
  animation:popIn .45s cubic-bezier(.22,.68,0,1.15);}

/* Bottom nav */
.bnav{display:flex;background:rgba(255,255,255,.9);border-top:1px solid rgba(124,58,237,.07);
  padding:8px 0 12px;flex-shrink:0;backdrop-filter:blur(20px);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;cursor:pointer;padding:3px 0;}
.bn-ic{font-size:24px;opacity:.25;transition:all .2s;}
.bn-lb{font-size:10px;color:#C0B0D8;font-weight:800;letter-spacing:.5px;}
.bn.on .bn-ic{opacity:1;filter:drop-shadow(0 2px 7px rgba(124,58,237,.38));}
.bn.on .bn-lb{color:#7C3AED;}

/* Orb — decorative, keep smaller */
.orb-wrap{position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.orb-ring{position:absolute;border-radius:50%;pointer-events:none;}

/* Flow chart */
.flow-wrap{max-width:520px;width:100%;background:rgba(255,255,255,.85);border:2px solid rgba(255,255,255,.95);
  border-radius:22px;padding:14px 18px;box-shadow:0 4px 20px rgba(124,58,237,.07);}
.flow-eye{font-size:10px;color:#C0B0D8;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.flow-group{margin-bottom:10px;}
.fg-label{font-size:11px;font-weight:800;margin-bottom:5px;}
.fg-row{display:flex;align-items:center;flex-wrap:wrap;row-gap:4px;}
.fnode{background:rgba(255,255,255,.8);border:2px solid rgba(200,190,220,.3);border-radius:10px;padding:4px 10px;cursor:pointer;transition:all .15s;}
.fnode span{font-size:10px;color:#B0A0C8;}
.fnode.apc span{color:#5B21B6;font-weight:800;} .fnode.apc{border-color:rgba(124,58,237,.35);background:rgba(124,58,237,.07);}
.fnode.aph span{color:#991B1B;font-weight:800;} .fnode.aph{border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.06);}
.fnode.apm span{color:#065F46;font-weight:800;} .fnode.apm{border-color:rgba(5,150,105,.3);background:rgba(5,150,105,.06);}
.farrow{color:#D8D0E8;font-size:12px;padding:0 3px;}
</style>
</head>
<body>

<div class="page-head">
  <div class="page-eye">Senior App Mockup</div>
  <div class="page-brand">LAAH</div>
  <div class="page-sub">LA Ai Health mate</div>
</div>

<div class="spec-box">
  <h3>Layout Rules</h3>
  <div class="spec-grid">
    <div class="spec-item"><div class="spec-label">Body text</div><div class="spec-val">20px</div></div>
    <div class="spec-item"><div class="spec-label">Header</div><div class="spec-val">30px</div></div>
    <div class="spec-item"><div class="spec-label">Vital numbers</div><div class="spec-val">36px</div></div>
    <div class="spec-item"><div class="spec-label">Button height</div><div class="spec-val">76px</div></div>
    <div class="spec-item"><div class="spec-label">Buttons/screen</div><div class="spec-val">Max 2</div></div>
    <div class="spec-item"><div class="spec-label">Scroll needed</div><div class="spec-val">Never</div></div>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<div class="pills" id="pills"></div>

<div class="phone">
  <div class="notch"></div>
  <div class="phone-inner">
    <div id="sc" style="flex:1;display:flex;flex-direction:column;overflow:hidden;"></div>
  </div>
</div>

<div class="flow-wrap">
  <div class="flow-eye">Screen Flow</div>
  <div id="flow"></div>
</div>

<div style="font-size:11px;color:#C0B0D8;text-align:center;">375 × 812 · Laah · Senior App Mockup</div>

<script>
const C={
  purple:"#7C3AED",purpleL:"rgba(124,58,237,.1)",purpleSoft:"#A855F7",
  green:"#059669",greenL:"rgba(5,150,105,.1)",greenSoft:"#34D399",
  red:"#DC2626",redL:"rgba(220,38,38,.1)",
  blue:"#0284C7",blueL:"rgba(2,132,199,.1)",
  amber:"#D97706",amberL:"rgba(217,119,6,.1)",
  txt:"#1A0C3F",txtSub:"#5C4B80",txtDim:"#A090C0",
};

const GROUPS=[
  {id:"core",lbl:"🏠 Core",color:C.purple,tc:"tc",pc:"pc",fc:"apc",screens:[
    {id:"home",    lbl:"Home",           e:"🎙",d:"Main"},
    {id:"notif",   lbl:"Laah Alert",     e:"🔔",d:"Lock screen"},
    {id:"listen",  lbl:"Voice Chat",     e:"🎧",d:"Listening"},
    {id:"suggest", lbl:"Suggestion",     e:"✅",d:"Yes / No"},
  ]},
  {id:"health",lbl:"🩺 Health",color:C.red,tc:"th",pc:"ph",fc:"aph",screens:[
    {id:"disease", lbl:"My Health",  e:"🩺",d:"Dashboard"},
    {id:"meds",    lbl:"Medication", e:"💊",d:"Single action"},
  ]},
  {id:"meal",lbl:"🥗 Meals",color:C.green,tc:"tm",pc:"pm",fc:"apm",screens:[
    {id:"meal_notif",  lbl:"Meal Alert",   e:"🍽",d:"Proactive"},
    {id:"meal_photo",  lbl:"Take Photo",   e:"📸",d:"Camera"},
    {id:"meal_scan",   lbl:"AI Analysis",  e:"🔍",d:"Scanning"},
    {id:"meal_result", lbl:"Nutrition",    e:"🥗",d:"Results"},
    {id:"meal_day",    lbl:"Daily Summary",e:"📋",d:"Summary"},
    {id:"meal_pick",   lbl:"Suggestions",  e:"💡",d:"Dinner pick"},
  ]},
];

const BNAV=[
  {id:"home",    icon:"🎙",lbl:"HOME"},
  {id:"disease", icon:"🩺",lbl:"HEALTH"},
  {id:"meal_day",icon:"🥗",lbl:"MEALS"},
  {id:"suggest", icon:"🤖",lbl:"LAAH"},
];

let cur="home",curG="core";

/* ── Helpers ── */
const sb=(t)=>`<div class="sb"><span>${t||"9:41 AM"}</span><div style="display:flex;gap:5px;font-size:11px;color:${C.txtDim};"><span>●●●</span><span>🔋</span></div></div>`;

/* Laah bubble — text large, padding compact */
const lb=(text,xtra)=>`<div class="lb" style="${xtra||''}"><div class="lb-tag">Laah</div><div class="lb-txt">${text}</div></div>`;

/* Orb — smaller than before (decorative) */
const orb=(size,active)=>{
  size=size||68;
  const rings=active?`
    <div class="orb-ring" style="width:${size}px;height:${size}px;border:2px solid ${C.purple};animation:ripple 2s ease-out infinite;"></div>
    <div class="orb-ring" style="width:${size}px;height:${size}px;border:2px solid ${C.purpleSoft};animation:ripple 2s ease-out .85s infinite;"></div>`:''
  const grad=active?`radial-gradient(circle at 36% 32%,#EDE9FE,${C.purple},${C.purpleSoft})`:`rgba(124,58,237,.07)`;
  const shadow=active?`0 8px 28px rgba(124,58,237,.4),inset 0 0 18px rgba(255,255,255,.25)`:`0 3px 12px rgba(124,58,237,.1)`;
  return `<div class="orb-wrap" style="width:${size}px;height:${size}px;">
    ${rings}
    <div style="width:${size}px;height:${size}px;border-radius:50%;position:relative;z-index:1;
      background:${grad};border:2px solid rgba(124,58,237,${active?.48:.16});
      box-shadow:${shadow};animation:${active?'breathe 2.2s ease-in-out infinite':''};
      display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.34)}px;">
      ${active?'💬':'🌿'}
    </div>
  </div>`;
};

/* Wave bars — shorter than before (decorative) */
const wave=(color,h)=>{
  color=color||C.purple; h=h||28;
  const ds=[.75,.5,.65,.42,.7,.52,.6,.45,.68,.48,.64,.5];
  const dl=[0,.07,.04,.11,.02,.09,.05,.13,.03,.1,.06,.08];
  let b='';
  for(let i=0;i<12;i++)
    b+=`<div style="width:4px;height:${h}px;background:${color};border-radius:3px;opacity:.65;transform-origin:center;animation:barWave ${ds[i]}s ease-in-out infinite ${dl[i]}s;"></div>`;
  return `<div style="display:flex;align-items:center;gap:4px;justify-content:center;">${b}</div>`;
};

/* btn helpers */
const btn=(lbl,icon,cls,onclick,xtra)=>
  `<button class="btn ${cls||'purple'}" onclick="${onclick||''}" style="${xtra||''}">
    ${icon?`<span class="bi">${icon}</span>`:''}<span>${lbl}</span>
  </button>`;
const ghost=(lbl,icon,onclick)=>
  `<button class="btn ghost" onclick="${onclick||''}">
    ${icon?`<span class="bi">${icon}</span>`:''}<span>${lbl}</span>
  </button>`;

const bnav=(active)=>`<div class="bnav">${BNAV.map(b=>`
  <button class="bn ${b.id===active?'on':''}" onclick="navigate('${b.id}')">
    <div class="bn-ic">${b.icon}</div>
    <div class="bn-lb">${b.lbl}</div>
  </button>`).join('')}</div>`;

const nbar=(lbl,val,max,unit,color,warn,good)=>{
  const pct=Math.min(100,Math.round(val/max*100));
  return `<div class="nbar-wrap">
    <div class="nbar-head">
      <div style="display:flex;align-items:center;gap:7px;">
        <span class="nbar-name">${lbl}</span>
        ${warn?`<span style="background:${C.redL};color:${C.red};border:2px solid rgba(220,38,38,.2);border-radius:10px;padding:3px 10px;font-size:12px;font-weight:800;">HIGH</span>`:''}
        ${good?`<span style="background:${C.greenL};color:${C.green};border:2px solid rgba(5,150,105,.2);border-radius:10px;padding:3px 10px;font-size:12px;font-weight:800;">GOOD</span>`:''}
      </div>
      <span class="nbar-val" style="color:${color};">${val}${unit}<span style="color:${C.txtDim};font-size:14px;font-weight:500;">/${max}${unit}</span></span>
    </div>
    <div class="nbar-track"><div class="nbar-fill" style="width:${pct}%;background:${color};box-shadow:0 0 6px ${color}44;"></div></div>
  </div>`;
};

/* ── SCREENS ── */
const S={};

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   🏠 HOME
   Layout: sb(26) + greeting(82) + orb+wave(106) + bubble(96) + vitals(76) + btns(76+8+76) + vhint(27) + nav(68) = 643 ✓
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
S.home=()=>`
<div class="screen">
  ${sb("8:02 AM")}

  <!-- Greeting — compact -->
  <div style="padding:8px 22px 10px;flex-shrink:0;
    background:linear-gradient(155deg,rgba(196,181,253,.22),rgba(252,231,243,.15));
    border-bottom:1px solid rgba(124,58,237,.07);">
    <div style="font-size:14px;color:${C.txtDim};margin-bottom:3px;">Monday, March 9 ☀️</div>
    <div style="font-size:32px;font-weight:900;color:${C.txt};letter-spacing:-1px;line-height:1.15;">
      Good morning,
      <span style="background:linear-gradient(135deg,${C.purple},${C.purpleSoft});
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;">Robert! 👋</span>
    </div>
  </div>

  <!-- Orb + wave — flex:1 so it absorbs leftover space, bnav always stays visible -->
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:8px 0;gap:8px;flex:1;min-height:0;">
    ${orb(72,true)}
    ${wave(C.purple,28)}
  </div>

  <!-- Laah message -->
  <div style="padding:0 18px;flex-shrink:0;">
    ${lb("Your BP meds are due in 30 minutes. Yankees play tonight — how about a walk before the game? 🧡")}
  </div>

  <!-- 3 vitals — compact -->
  <div style="display:flex;gap:8px;padding:10px 18px 0;flex-shrink:0;">
    ${[{icon:"❤️",val:"118/76",lbl:"BP",         c:C.green,bg:C.greenL},
       {icon:"🩸",val:"98",    lbl:"Blood Sugar", c:C.amber,bg:C.amberL},
       {icon:"😴",val:"7.3h",  lbl:"Sleep",       c:C.blue, bg:C.blueL}].map(v=>`
      <div style="flex:1;background:${v.bg};border:2px solid rgba(255,255,255,.95);
        border-radius:18px;padding:10px 4px;text-align:center;">
        <div style="font-size:22px;margin-bottom:3px;">${v.icon}</div>
        <div style="font-size:17px;font-weight:900;color:${v.c};">${v.val}</div>
        <div style="font-size:12px;color:${C.txtDim};margin-top:2px;font-weight:600;">${v.lbl}</div>
      </div>`).join('')}
  </div>

  <!-- Buttons — OUTSIDE any scroll, always visible -->
  <div class="btn-zone">
    ${btn("Yes, let's plan! 🚶","","purple","navigate('suggest')")}
    ${ghost("Remind me later","🔔","navigate('disease')")}
  </div>
  <div class="vhint">🎤 Just say "Yes" or "No" out loud</div>

  ${bnav("home")}
</div>`;

function confirmNo(){

      <div style="font-size:54px;animation:float 2.5s ease-in-out infinite;">😊</div>
      ${lb("No problem! I'll remind you again at 6:30 PM. Enjoy your rest, Robert. 💛")}
    </div>`;
  document.querySelector('#sc .btn-zone').innerHTML=ghost("Back to Home","🏠","navigate('home')");
  document.querySelector('#sc .vhint').style.display='none';
}
function medDone(){
  document.getElementById('medContent').innerHTML=`
    <div style="animation:slideUp .35s ease;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div style="width:90px;height:90px;border-radius:28px;
        background:rgba(5,150,105,.1);border:3px solid rgba(5,150,105,.28);
        display:flex;align-items:center;justify-content:center;font-size:44px;
        box-shadow:0 10px 28px rgba(5,150,105,.18);animation:celebBounce .6s ease;">✅</div>
      <div style="font-size:32px;font-weight:900;color:${C.txt};letter-spacing:-.5px;">Great job, Robert! 🎉</div>
      ${lb("Metformin logged at 12:03 PM. Doctor's app updated. That's a 14-day streak! 💪")}
    </div>`;
  document.querySelector('#sc .btn-zone').innerHTML=btn("Back to Home","🏠","green","navigate('home')");
}

let scanTimer;
function startScan(){
  if(!document.getElementById('sr0'))return;
  let i=0;
  scanTimer=setInterval(()=>{
    i++;
    if(i<5){
      for(let j=0;j<5;j++){
        const row=document.getElementById('sr'+j);
        const dot=document.getElementById('sd'+j);
        if(!row||!dot)continue;
        if(j<i){
          row.style.opacity='1';
          dot.style.background=`linear-gradient(135deg,${C.green},#6EE7B7)`;
          dot.style.boxShadow=`0 3px 10px rgba(5,150,105,.32)`;
          dot.innerHTML=`<span style="font-size:13px;color:#FFF;font-weight:900;">✓</span>`;
        } else if(j===i){
          row.style.opacity='1';
          dot.style.background=`linear-gradient(135deg,${C.purple},${C.purpleSoft})`;
          dot.style.boxShadow=`0 3px 10px rgba(124,58,237,.32)`;
          dot.innerHTML=`<div style="width:10px;height:10px;border-radius:50%;border:2.5px solid #FFF;border-top-color:transparent;animation:spin .8s linear infinite;"></div>`;
        }
      }
      const labels=['sl1','sl2','sl3'];
      if(labels[i-1]){const el=document.getElementById(labels[i-1]);if(el)el.style.display='block';}
    } else {
      clearInterval(scanTimer);
      setTimeout(()=>navigate('meal_result'),400);
    }
  },850);
}

function selOpt(i){
  [0,1].forEach(j=>{
    const el=document.getElementById('sopt'+j);
    const oc=document.getElementById('oc'+j);
    if(el){
      el.style.borderColor=j===i?C.green:'rgba(255,255,255,.98)';
      el.style.boxShadow=j===i?`0 6px 22px rgba(5,150,105,.18)`:'0 3px 12px rgba(0,0,0,.04)';
    }
    if(oc)oc.style.display=j===i?'block':'none';
  });
}

/* ── Navigation ── */
function navigate(id){
  if(scanTimer)clearInterval(scanTimer);
  cur=id;
  const g=GROUPS.find(g=>g.screens.some(s=>s.id===id));
  if(g)curG=g.id;
  render();
  if(id==='meal_scan')setTimeout(startScan,280);
}
function switchGroup(id){
  curG=id;
  navigate(GROUPS.find(g=>g.id===id).screens[0].id);
}

function render(){
  const grp=GROUPS.find(g=>g.id===curG);
  document.getElementById('tabs').innerHTML=GROUPS.map(g=>
    `<button class="tab ${curG===g.id?g.tc:''}" onclick="switchGroup('${g.id}')">${g.lbl}</button>`
  ).join('');
  document.getElementById('pills').innerHTML=grp.screens.map(s=>
    `<button class="pill ${cur===s.id?grp.pc:''}" onclick="navigate('${s.id}')">
      <span>${s.e} ${s.lbl}</span><span class="pd">${s.d}</span>
    </button>`
  ).join('');
  document.getElementById('sc').innerHTML=S[cur]?S[cur]():'';
  document.getElementById('flow').innerHTML=GROUPS.map(g=>`
    <div class="flow-group">
      <div class="fg-label" style="color:${g.color};">${g.lbl}</div>
      <div class="fg-row">
        ${g.screens.map((s,i)=>
          (i>0?'<div class="farrow">→</div>':'')+
          `<div class="fnode ${cur===s.id?g.fc:''}" onclick="navigate('${s.id}')"><span>${s.e} ${s.lbl}</span></div>`
        ).join('')}
      </div>
    </div>`
  ).join('');
}

render();
</script>
